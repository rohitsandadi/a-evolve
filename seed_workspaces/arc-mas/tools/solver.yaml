# Tools available to solver subagents
tools:
  submit_action:
    description: "Submit a game action. Returns frame info, change summary, and budget."
  run_action_sequence:
    description: "Execute a batch of actions in order. Stops on WIN/GAME_OVER/budget."
  get_history:
    description: "Recent action history from all agents."
  render_frame:
    description: "Render the current grid as text. Crop to zoom in."
  render_diff:
    description: "Visual diff between current and previous frame."
  change_summary:
    description: "Quick overview of what changed since last frame."
  find_colors:
    description: "Find all pixels matching given colors."
  color_counts:
    description: "Count of each color in the grid."
  bounding_box:
    description: "Bounding box of pixels matching given colors."
  wiki_index:
    description: "List all wiki pages with summaries."
  wiki_read:
    description: "Read a specific wiki page."
  wiki_write:
    description: "Write to a wiki page (auto-appends on critical pages)."
  wiki_append:
    description: "Append to a wiki page with separator."
