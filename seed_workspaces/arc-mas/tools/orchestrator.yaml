# Tools available to the orchestrator (NO game actions — delegates to subagents)
tools:
  spawn_and_run_subagent:
    description: "Create a subagent with a role, prompt, and task. Runs to completion."
  call_existing_agent:
    description: "Call a previously spawned subagent with a new task."
  render_frame:
    description: "Render the current grid to understand game state."
  get_history:
    description: "Recent action history from all agents."
  wiki_index:
    description: "List all wiki pages with summaries."
  wiki_read:
    description: "Read a specific wiki page."
  wiki_write:
    description: "Write to a wiki page."
  wiki_append:
    description: "Append to a wiki page."
