# MetaHarness configuration for MCP-Atlas benchmark
#
# Paper-faithful settings adapted for MCP:
#   - 10 evolution cycles, k=2 candidates per cycle
#   - No holdout (search + eval on same tasks)
#   - Claude Code CLI as proposer (Opus 4.6)
#   - Claude Opus 4.6 as solver (via Bedrock)
#   - Claude Opus 4.6 as judge (via Bedrock)

batch_size: 500
max_cycles: 10
holdout_ratio: 0.0
evolve_prompts: true
evolve_skills: true
evolve_memory: true
evolve_tools: false
egl_threshold: 0.02
egl_window: 3

# MetaHarnessEngine extras
harness_enabled: true
proposer_model: us.anthropic.claude-opus-4-6-v1
proposer_max_turns: 50
proposer_timeout_sec: 900
num_candidates: 2
eval_sample_size: 0        # 0 = all tasks. Set >0 for budget runs
rollback_on_regression: false

# Solver/eval extras
solver_model: us.anthropic.claude-opus-4-6-v1
solver_region: us-west-2
solver_max_tokens: 16384
solve_workers: 20
agent_timeout_sec: 600

# MCP-specific
docker_image: ghcr.io/scaleapi/mcp-atlas:latest
eval_model: us.anthropic.claude-opus-4-6-v1
eval_use_litellm: false
